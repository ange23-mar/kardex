server:
  port: 8086
  address: 0.0.0.0

spring:
  application:
    name: ms-kardex

  # ====================================================================
  # OPCIÓN 2: CONEXIÓN ORACLE DE TU COMPAÑERO (COMENTADA PARA FUTURO USO)
  # ====================================================================
  # datasource:
  #   url: jdbc:oracle:thin:@localhost:1521:XE
  #   username: SCHEMA_BODEGAS
  #   password: FullStack-Bodega1
  #   driver-class-name: oracle.jdbc.OracleDriver
  datasource:
    url: jdbc:mysql://host.docker.internal:3306/db_ms_kardex
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html